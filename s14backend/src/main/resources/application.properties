spring.application.name=s14backend
server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/cicd
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD_HERE

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Twilio Credentials (PLACED IN SYSTEM ENVIRONMENT VARIABLES OR SECRETS FOR PRODUCTION)
twilio.account.sid=YOUR_TWILIO_SID_HERE
twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN_HERE
twilio.phone.number=YOUR_TWILIO_PHONE_NUMBER_HERE
