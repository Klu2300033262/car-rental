spring.application.name=s14backend

# Aiven MySQL Cloud Connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gmail SMTP Configuration (SWITCHED TO SSL PORT 465)
spring.mail.host=smtp.gmail.com
spring.mail.port=465
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory

# Twilio Credentials
twilio.account.sid=${TWILIO_ACCOUNT_SID:AC_PLACEHOLDER}
twilio.auth.token=${TWILIO_AUTH_TOKEN:TOKEN_PLACEHOLDER}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1000000000}
