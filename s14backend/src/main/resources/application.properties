spring.application.name=s14backend

# Aiven MySQL Cloud Connection
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Gmail SMTP Configuration (ULTRA COMPATIBLE SETTINGS)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${GMAIL_USERNAME}
spring.mail.password=${GMAIL_APP_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Twilio Credentials
twilio.account.sid=${TWILIO_ACCOUNT_SID:AC_PLACEHOLDER}
twilio.auth.token=${TWILIO_AUTH_TOKEN:TOKEN_PLACEHOLDER}
twilio.phone.number=${TWILIO_PHONE_NUMBER:+1000000000}
